# App configuration - tweak without code changes
# Used in Milestone 3+ for chunking, embeddings, etc.

chunking:
  chunk_size: 1500  # Characters per chunk
  chunk_overlap: 200  # Overlap for context

embeddings:
  model_name: "all-MiniLM-L6-v2"  # Default sentence-transformers model

rag:
  top_k: 4  # Number of chunks to retrieve
  prompt_template: "Answer using only this context: {context}\nQuestion: {question}"

# Add more as needed (e.g., LLM settings)
