# configs/config.yaml
chunking:
  chunk_size: 1000          # characters per chunk – tune for your documents
  chunk_overlap: 400        # overlap to preserve context between chunks

embeddings:
  model_name: "all-MiniLM-L6-v2"  # fast 384-dim model, excellent for private RAG

rag:
  top_k: 5                  # how many chunks to retrieve per query
