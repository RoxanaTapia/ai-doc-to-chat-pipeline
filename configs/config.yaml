# configs/config.yaml
chunking:
  chunk_size: 1000          # characters per chunk – tune for your documents
  chunk_overlap: 200        # R4-D: smaller overlap to reduce cross-section bleed
  split_on_legal_headers: true  # tuning #2: split at numbered / title-style clause headers

embeddings:
  model_name: "all-MiniLM-L6-v2"  # fast 384-dim model, excellent for private RAG

rag:
  top_k: 5                   # chunks fed to the LLM (Round 2: tighter for short contracts)
  fetch_k: 75                # candidate pool size before MMR reranking
  early_page_max: 20         # prefer chunks from pages <= this value
  ui:
    sources_display_max: 5   # sources shown in chat UI (can be <= top_k)
    source_preview_chars: 280
  retrieval:
    strategy: "hybrid"       # Round 2 default: semantic + BM25 for section/term lookup
    bm25_fetch_k: 75         # candidate pool size for BM25 sparse retrieval
    rrf_k: 60                # reciprocal rank fusion constant
    dense_weight: 1.0        # weight of dense rank contribution in fusion
    bm25_weight: 1.0         # weight of sparse rank contribution in fusion
    reranker:
      enabled: true          # R4-A: cross-encoder re-rank after hybrid fusion
      model_name: "BAAI/bge-reranker-base"
      top_n: 50              # rerank this many candidates before selecting top_k
    max_chunks_per_page: 2   # R4-D: diversify top-k across pages
    dedupe_similar_chunks: true   # tuning #3: drop near-duplicate source chunks
    dedupe_prefix_chars: 180
    context_sufficiency_guard: true   # tuning #3: skip LLM when context cannot answer
    section_aware:
      enabled: true          # R4-C: boost/filter when query names "Section N"
      boost: 1.5
      min_chunks: 2
      hard_context_filter: true   # R4-E: LLM context + Sources use section-matching chunks only
      context_min_chunks: 2
  generation:
    # Informational / self-host default (ollama). Runtime selection:
    #   1. Non-empty env LLM_PROVIDER wins (ollama|anthropic|openai|dummy)
    #   2. Else dummy_mode / USE_DUMMY_GENERATOR → dummy vs ollama
    # YAML alone does not select the backend when LLM_PROVIDER is unset.
    # anthropic: needs ANTHROPIC_API_KEY; model via ANTHROPIC_MODEL
    #   (default claude-haiku-4-5-20251001). openai: not implemented yet.
    provider: ollama
    model: "llama3.1:8b"     # default local Ollama model (override with OLLAMA_MODEL)
    max_new_tokens: 384      # room for bullet answers (Round 2)
    temperature: 0.3         # creativity when do_sample is true
    top_p: 0.9               # nucleus sampling (useful to reduce repetition)
    do_sample: false         # false => deterministic (temperature forced to 0)
    fallback_to_dummy_on_error: false  # if true, returns dummy output when Ollama is unavailable
    num_ctx: 4096            # context window limit passed to Ollama
    timeout_seconds: 90      # generation timeout safeguard
