<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your AI Doc invite</title>
</head>
<body style="margin:0;padding:0;background:#0c1218;color:#e8eef0;font-family:'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.55;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0c1218;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#152028;border:1px solid rgba(126,184,192,0.28);border-radius:6px;padding:28px 24px;">
          <tr>
            <td>
              <p style="margin:0 0 8px;font-size:12px;letter-spacing:0.12em;text-transform:lowercase;color:#a8bdc4;">
                ai-doc-pilot.roxanatapia.dev
              </p>
              <h1 style="margin:0 0 12px;font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:600;color:#e8eef0;">
                Your temporary invite
              </h1>
              <p style="margin:0 0 16px;font-size:16px;color:#c5d4d8;">
                Access to the AI Doc pilot is by invitation. This invite expires in
                <strong style="color:#e8eef0;">{{ ttl_label }}</strong>.
              </p>
              <p style="margin:0 0 24px;">
                <a href="{{ redeem_url }}"
                   style="display:inline-block;padding:12px 20px;background:#63a4ad;color:#0c1218;text-decoration:none;font-weight:600;border-radius:4px;">
                  Open invite
                </a>
              </p>
              <p style="margin:0 0 8px;font-size:14px;color:#a8bdc4;">
                Or paste this code on the gate under <em>I have an invite</em>:
              </p>
              <p style="margin:0 0 20px;padding:12px;background:#0c1218;border:1px solid rgba(126,184,192,0.28);border-radius:4px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;word-break:break-all;color:#7eb8c0;">
                {{ code }}
              </p>
              <p style="margin:0;font-size:13px;color:#a8bdc4;">
                If you did not request this, you can ignore the message.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
