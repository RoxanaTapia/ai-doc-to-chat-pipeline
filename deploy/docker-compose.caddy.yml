# HTTPS reverse proxy overlay — run from the **repo root**:
#
#   docker compose --env-file .env -p ai-doc-to-chat-pipeline \
#     -f deploy/docker-compose.yml -f deploy/docker-compose.caddy.yml up -d
#
# Why these flags (learned in M4 cutover):
# - `--env-file .env` loads SITE_ADDRESS / ACME_EMAIL / INVITE_SECRET from the repo-root .env
#   (Compose does not auto-load root .env when the first -f file is under deploy/).
# - `-p ai-doc-to-chat-pipeline` keeps volume names stable (avoid project name "deploy").
# - Volume paths below are relative to this file's directory (deploy/).
#   Do NOT use `--project-directory` at repo root with these relative paths, or
#   Docker may create empty host directories named Caddyfile / caddy-basicauth.conf.
#
# Streamlit stays on the internal Compose network; only Caddy publishes 80/443.
# Generate auth first: ./deploy/generate-caddy-auth.sh demo 'your-password'
# Invites: set INVITE_SECRET in .env; mint with python deploy/invite/mint.py

services:
  app:
    ports: !override []

  invite:
    build: ./invite
    restart: unless-stopped
    environment:
      INVITE_SECRET: ${INVITE_SECRET:?Set INVITE_SECRET in repo-root .env}
      INVITE_BIND: 0.0.0.0
      INVITE_PORT: "8090"
      INVITE_BASE_URL: ${INVITE_BASE_URL:-https://ai-doc-pilot.roxanatapia.dev}
      INVITE_REQUEST_TTL: ${INVITE_REQUEST_TTL:-72h}
      INVITE_NOTIFY_TO: ${INVITE_NOTIFY_TO:-hello@roxanatapia.dev}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-hello@roxanatapia.dev}
      SMTP_TLS: ${SMTP_TLS:-true}
    expose:
      - "8090"

  caddy:
    image: caddy:2.9.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./caddy-basicauth.conf:/etc/caddy/caddy-basicauth.conf:ro
      - ./certs:/etc/caddy/certs:ro
      # Static front doors from roxanatapia-web (clone/rsync to host paths first).
      - /srv/roxanatapia-web/sites/apex:/srv/roxanatapia-web/sites/apex:ro
      - /srv/roxanatapia-web/sites/pilot-gate:/srv/roxanatapia-web/sites/pilot-gate:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - invite

volumes:
  caddy_data:
  caddy_config:
