services:
  ollama:
    image: ollama/ollama:0.6.5
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # No curl in image; probes skip ENTRYPOINT — use /bin/ollama list against the local API.
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  app:
    build:
      # context = repo root (.dockerignore lives there); dockerfile path is relative to context
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8501:8501"
    environment:
      OLLAMA_HOST: http://ollama:11434
      # Override in `.env` with OLLAMA_MODEL=phi3:mini on RAM-limited CPU hosts.
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      USE_DUMMY_GENERATOR: "false"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: none
      # Client-facing VPS: APP_ALLOW_DEV_TOGGLE=false APP_PRESENTATION_MODE=client
      APP_ALLOW_DEV_TOGGLE: ${APP_ALLOW_DEV_TOGGLE:-false}
      APP_PRESENTATION_MODE: ${APP_PRESENTATION_MODE:-client}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # Thin M8 API (optional). Same image as app; OpenAPI at http://localhost:8000/docs
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PYTHONPATH: /app/src
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      USE_DUMMY_GENERATOR: "false"
      LLM_PROVIDER: ${LLM_PROVIDER:-}
    command:
      [
        "uvicorn",
        "api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - api

volumes:
  ollama_models:
